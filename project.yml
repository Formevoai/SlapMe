name: SlapMe
options:
  bundleIdPrefix: com.slapme
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "15"
  createIntermediateGroups: true
  knownRegions:
    - en
    - tr
    - de
    - es
    - fr
    - pt-BR
    - it
    - nl
    - ru
    - ja
    - ko
    - zh-Hans
    - ar
    - hi
    - pl
    - id

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "15.0"

targets:
  SlapMe:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: SlapMe
        excludes:
          - "Resources/Sounds/**"
          - "Resources/Packs/**"
          - "Resources/Characters/**"
          - "Assets.xcassets"
      - path: SlapMe/Assets.xcassets
      - path: SlapMe/Resources/Sounds
        type: folder
        buildPhase: resources
        name: Sounds
      - path: SlapMe/Resources/Packs
        type: folder
        buildPhase: resources
        name: Packs
      - path: SlapMe/Resources/Characters
        type: folder
        buildPhase: resources
        name: Characters
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.slapme.SlapMe
        PRODUCT_NAME: SlapMe
        INFOPLIST_FILE: SlapMe/App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_EMIT_LOC_STRINGS: YES
        ENABLE_PREVIEWS: YES
        DEVELOPMENT_TEAM: Z8LNR73NY4
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1"
    scheme:
      testTargets: []
      storeKitConfiguration: SlapMe/Configuration.storekit
    info:
      path: SlapMe/App/Info.plist
      properties:
        CFBundleDisplayName: SlapMe
        CFBundleShortVersionString: "1.2"
        CFBundleVersion: "11"
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: LaunchBG
        UIRequiredDeviceCapabilities:
          - accelerometer
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSMotionUsageDescription: "SlapMe uses motion sensors to detect slaps and play sound effects. / SlapMe hareket sensörlerini kullanarak vuruşları algılar ve ses efektleri çalar."
        NSPhotoLibraryUsageDescription: "SlapMe uses your photo library so you can set a cover image for your custom sound pack. / SlapMe, özel ses paketiniz için kapak görseli seçmenizi sağlamak amacıyla fotoğraf kitaplığınıza erişir."
        UIBackgroundModes:
          - audio
        ITSAppUsesNonExemptEncryption: false
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - slapme
            CFBundleURLName: com.slapme.SlapMe
