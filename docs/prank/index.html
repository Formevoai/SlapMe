<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SlapMe Prank</title>
  <style>
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      text-align: center;
      padding: 20px;
    }
    .emoji { font-size: 64px; margin-bottom: 20px; }
    h1 { font-size: 22px; font-weight: 700; margin: 0 0 8px; }
    p  { font-size: 15px; color: #aaa; margin: 0 0 32px; }
    a  {
      background: #ff2d78;
      color: #fff;
      text-decoration: none;
      padding: 14px 32px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
    }
  </style>
  <script>
    (function () {
      var params = window.location.search;
      var appUrl = "slapme://prank" + params;
      // Try to open the app
      window.location = appUrl;
      // Fallback to App Store after 2.5s if app not installed
      setTimeout(function () {
        window.location = "https://apps.apple.com/app/slapme/id6745810523";
      }, 2500);
    })();
  </script>
</head>
<body>
  <div class="emoji">👋</div>
  <h1>Opening SlapMe...</h1>
  <p>If nothing happens, make sure SlapMe is installed.</p>
  <a href="https://apps.apple.com/app/slapme/id6745810523">Download SlapMe</a>
</body>
</html>
