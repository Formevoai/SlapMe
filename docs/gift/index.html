  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: var(--bg); transition: background 0.6s ease; -webkit-font-smoothing: antialiased;
    }
    .screen { width: 92%; max-width: 360px; }
    #vol-toast {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-80px);
      background: rgba(28,28,30,0.92); color: #fff; padding: 12px 20px; border-radius: 14px;
      display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 500; white-space: nowrap;
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      transition: transform 0.4s cubic-bezier(.34,1.56,.64,1); z-index: 100;
    }
    #vol-toast.show { transform: translateX(-50%) translateY(0); }
    #vol-toast .vol-icon { font-size: 20px; }
    #tap-screen .card { background: var(--card); border-radius: 24px; padding: 36px 24px 28px; box-shadow: 0 4px 32px rgba(0,0,0,0.08); text-align: left; }
    #tap-screen .file-header { display: flex; align-items: center; gap: 14px; margin-bottom: 24px; }
    #tap-screen .file-icon { width: 52px; height: 52px; border-radius: 12px; flex-shrink: 0; background: linear-gradient(135deg,#5a5fff,#3b82f6); display: flex; align-items: center; justify-content: center; font-size: 26px; }
    #tap-screen .file-meta { flex: 1; }
    #tap-screen .file-name { font-size: 15px; font-weight: 600; color: var(--text); }
    #tap-screen .file-size { font-size: 12px; color: var(--sub); margin-top: 3px; }
    #tap-screen .sender { display: flex; align-items: center; gap: 10px; background: #f2f2f7; border-radius: 12px; padding: 12px 14px; margin-bottom: 20px; }
    #tap-screen .avatar { width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0; background: linear-gradient(135deg,var(--pink),#ff6b35); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; color: #fff; }
    #tap-screen .sender-info .from { font-size: 11px; color: var(--sub); }
    #tap-screen .sender-info .name { font-size: 14px; font-weight: 600; color: var(--text); }
    #tap-btn { width: 100%; background: var(--blue); color: #fff; border: none; border-radius: 14px; font-size: 17px; font-weight: 600; padding: 15px; cursor: pointer; font-family: inherit; letter-spacing: -0.2px; transition: opacity 0.15s; }
    #tap-btn:active { opacity: 0.8; }
    #loading { display: none; }
    #loading .card { background: var(--card); border-radius: 24px; padding: 36px 24px 28px; box-shadow: 0 4px 32px rgba(0,0,0,0.08); text-align: center; }
    #loading .file-icon-lg { width: 72px; height: 72px; border-radius: 18px; background: linear-gradient(135deg,#5a5fff,#3b82f6); display: flex; align-items: center; justify-content: center; font-size: 36px; margin: 0 auto 20px; }
    #loading h1 { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 5px; }
    #loading .status { font-size: 13px; color: var(--sub); margin-bottom: 22px; min-height: 18px; }
    .track { background: #e5e5ea; border-radius: 6px; height: 5px; overflow: hidden; }
    .fill  { height: 100%; background: var(--blue); border-radius: 6px; width: 0%; transition: width 0.35s ease; }
    #pct   { font-size: 12px; color: var(--sub); margin-top: 10px; text-align: right; }
    #boom  { display: none; text-align: center; padding: 20px 16px; width: 92%; max-width: 360px; }
    #boom .hand { font-size: 96px; display: block; margin-bottom: 12px; animation: punch 0.5s cubic-bezier(.36,1.56,.64,1) both; }
    #boom h1 { font-size: 32px; font-weight: 900; color: #fff; letter-spacing: -1px; margin-bottom: 6px; animation: pop 0.5s 0.1s cubic-bezier(.36,1.56,.64,1) both; }
    #boom .sub { font-size: 15px; color: rgba(255,255,255,0.7); margin-bottom: 36px; line-height: 1.5; animation: fadeUp 0.5s 0.25s ease both; }
    #boom .app-card { animation: fadeUp 0.6s 0.4s ease both; }
    #boom .app-card-label { font-size: 11px; color: rgba(255,255,255,0.45); text-transform: uppercase; letter-spacing: 1.3px; margin-bottom: 10px; }
    #boom .app-card a { display: flex; align-items: center; gap: 14px; background: #fff; text-decoration: none; padding: 14px 16px; border-radius: 22px; box-shadow: 0 16px 56px rgba(0,0,0,0.32); transition: transform 0.15s, box-shadow 0.15s; }
    #boom .app-card a:active { transform: scale(0.97); box-shadow: 0 8px 28px rgba(0,0,0,0.25); }
    #boom .app-logo { width: 60px; height: 60px; border-radius: 14px; flex-shrink: 0; background: linear-gradient(135deg,var(--pink) 0%,#ff6b35 100%); display: flex; align-items: center; justify-content: center; font-size: 32px; }
    #boom .app-details { text-align: left; flex: 1; }
    #boom .app-name { font-size: 16px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; }
    #boom .app-tagline { font-size: 12px; color: var(--sub); margin-top: 2px; }
    #boom .app-stars { color: #ff9500; font-size: 12px; letter-spacing: 1px; margin-top: 5px; }
    #boom .dl-btn { background: var(--blue); color: #fff; font-size: 15px; font-weight: 700; padding: 10px 22px; border-radius: 22px; white-space: nowrap; flex-shrink: 0; letter-spacing: -0.2px; }
    @keyframes punch  { 0% { transform: scale(0) rotate(-30deg); opacity: 0 } 100% { transform: scale(1) rotate(0deg); opacity: 1 } }
    @keyframes pop    { 0% { transform: scale(0.5); opacity: 0 } 100% { transform: scale(1); opacity: 1 } }
    @keyframes fadeUp { 0% { transform: translateY(16px); opacity: 0 } 100% { transform: translateY(0); opacity: 1 } }

    function getLang() {
      var nav = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
      if (nav.startsWith('de')) return 'de';
      if (nav.startsWith('tr')) return 'tr';
      if (nav.startsWith('fr')) return 'fr';
      if (nav.startsWith('es')) return 'es';
      if (nav.startsWith('it')) return 'it';
      if (nav.startsWith('pt')) return 'pt';
      if (nav.startsWith('nl')) return 'nl';
      if (nav.startsWith('pl')) return 'pl';
      if (nav.startsWith('ru')) return 'ru';
      if (nav.startsWith('ar')) return 'ar';
      if (nav.startsWith('ja')) return 'ja';
      if (nav.startsWith('ko')) return 'ko';
      if (nav.startsWith('zh')) return 'zh';
      if (nav.startsWith('id')) return 'id';
      if (nav.startsWith('hi')) return 'hi';
      return 'en';
    }

    document.getElementById('sender-name').textContent     = t.friend;
    document.getElementById('tap-btn').textContent         = t.playBtn;
    document.getElementById('loading-title').textContent   = t.loadTitle;
    document.getElementById('vol-toast-text').textContent  = t.volume;
    document.getElementById('boom-title').textContent      = t.gotYou;
    document.getElementById('boom-sub').innerHTML          = t.boomSub;
    document.getElementById('app-card-label').textContent  = t.cta;
    document.getElementById('app-tagline').textContent     = t.appTagline;
    document.getElementById('dl-btn').textContent          = t.getBtn;

    var params    = new URLSearchParams(window.location.search);
    var delay     = Math.max(0, parseInt(params.get('delay') || '5', 10));
    var bar       = document.getElementById('bar');
    var pct       = document.getElementById('pct');
    var statusTxt = document.getElementById('status-txt');
    var tapScreen = document.getElementById('tap-screen');
    var loading   = document.getElementById('loading');
    var boom      = document.getElementById('boom');
    var boomSnd   = document.getElementById('snd-boom');
    var volToast  = document.getElementById('vol-toast');

    document.getElementById('tap-btn').addEventListener('click', function () {
      boomSnd.load();
      tapScreen.style.display = 'none';
      loading.style.display   = 'block';
      volToast.classList.add('show');
      setTimeout(function() { volToast.classList.remove('show'); }, 3000);
      startLoading();
    });

    function startLoading() {
      var start = Date.now();
      var total = delay * 1000;
      var lastStatus = -1;

      function tick() {
        var elapsed  = Date.now() - start;
        var ratio    = total === 0 ? 1 : Math.min(elapsed / total, 1);
        var progress;
        if (total === 0) { progress = 100; }
        else if (ratio < 0.5) progress = ratio * 2 * 72;
        else if (ratio < 0.9) progress = 72 + (ratio - 0.5) / 0.4 * 20;
        else                  progress = 92 + (ratio - 0.9) / 0.1 * 8;
        progress = Math.min(progress, 100);

        bar.style.width = progress.toFixed(0) + '%';
        pct.textContent = progress.toFixed(0) + '%';

        var si = Math.min(Math.floor(ratio * t.statuses.length), t.statuses.length - 1);
        if (si !== lastStatus) { statusTxt.textContent = t.statuses[si]; lastStatus = si; }

        if (progress < 100) { requestAnimationFrame(tick); }
        else { setTimeout(showBoom, 300); }
      }
      requestAnimationFrame(tick);
    }

    function showBoom() {
      loading.style.display = 'none';
      boom.style.display    = 'block';
      document.body.style.background = '#ff2d78';
      boomSnd.volume = 1.0;
      boomSnd.play().catch(function(){});
      if (navigator.vibrate) navigator.vibrate([300, 80, 500]);
    }
  })();
  </script>
</body>
</html>
